{% extends "base.html" %}

{% block title %}Sobre mí - Pablo Caraballo{% endblock %}

{% block content %}
<section class="about-page py-5" style="margin-top: 80px;">
    <div class="container">
        <div class="row align-items-center">
            <div class="col-md-6" data-aos="fade-right">
                <h1 class="mb-4">Sobre mí</h1>
                <p class="lead">{{ about.description }}</p>
                
                <h3 class="mt-4 mb-3">Mis intereses</h3>
                <ul class="list-unstyled">
                    {% for interest in about.interests %}
                    <li class="mb-2">
                        <i class="fas fa-chevron-right text-primary me-2"></i>
                        {{ interest }}
                    </li>
                    {% endfor %}
                </ul>
            </div>
            <div class="col-md-6" data-aos="fade-left">
                <img src="{{ url_for('static', filename='img/profile.jpg') }}" 
                     alt="Pablo Caraballo" 
                     class="img-fluid rounded shadow">
            </div>
        </div>
    </div>
</section>
{% endblock %}
